version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: cv_screening_postgres

    environment:
      POSTGRES_DB: cv_screening
      POSTGRES_USER: cv_user
      POSTGRES_PASSWORD: cv_password

    ports:
      - "5435:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

    restart: unless-stopped

volumes:
  pgdata: